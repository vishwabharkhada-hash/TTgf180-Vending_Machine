# Tiny Tapeout project information
project:
  title:        "Vending Machine"      # Project title
  author:       "Vishwa Bharkhada and Christofer Schmidt"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Digital vending machine controller using finite state machine"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     12       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_vishwabharkhada_hash_vending_machine"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "vending_machine.v"
    - "tt_um_vishwabharkhada-hash_vending_machine.v

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "onlinepayment_selected"
  ui[1]: "product_select_bit0"
  ui[2]: "product_select_bit1"
  ui[3]: "product_select_bit2"
  ui[4]: "product_select_bit3"
  ui[5]: "online_payment_success"
  ui[6]: "unused"
  ui[7]: "unused"

  # Outputs
  uo[0]: "show_product_number"
  uo[1]: "show_payment_status"
  uo[2]: "show_output_status"
  uo[3]: "SEG_A"
  uo[4]: "SEG_B"
  uo[5]: "SEG_C"
  uo[6]: "SEG_D"
  uo[7]: "SEG_E"

  # Bidirectional pins
  uio[0]: "SEG_F"
  uio[1]: "SEG_G"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
